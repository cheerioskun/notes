<!--
  toc — numbered table of contents block. Decimal-leading-zero mono counter,
  two-column grid that collapses to one on narrow screens. Anchor links to section IDs.
  Vars consumed: --surface-recessed, --border, --text-muted, --text-dim, --accent, --font-mono.
  Use when the post has 7+ sections. Pair section h2s with scroll-margin-top.
  Example: <nav class="toc"><div class="toc__label">In this part</div><ol><li><a href="#s1">…</a></li></ol></nav>
-->
<style>
  .toc {
    background: var(--surface-recessed);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 22px 28px;
    margin-bottom: 56px;
  }
  .toc__label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .toc ol {
    list-style: none;
    counter-reset: toc;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 28px;
  }
  @media (max-width: 560px) {
    .toc ol { grid-template-columns: 1fr; }
  }
  .toc li {
    counter-increment: toc;
    line-height: 1.4;
  }
  .toc a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 15px;
    display: flex;
    gap: 12px;
    align-items: baseline;
    padding: 4px 0;
    transition: color 0.15s;
  }
  .toc a:hover { color: var(--accent); }
  .toc a::before {
    content: counter(toc, decimal-leading-zero);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
    min-width: 24px;
  }
</style>

<nav class="toc">
  <div class="toc__label">In this part</div>
  <ol>
    <li><a href="#s1">First section title</a></li>
    <li><a href="#s2">Second section title</a></li>
  </ol>
</nav>
