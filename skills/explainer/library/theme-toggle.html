<!--
  theme-toggle — explicit light/dark switch driven by html[data-theme].
  Vars consumed: --border-bright, --text-dim, --accent, --font-mono.
  Public attr: data-theme-toggle (any button). Initial: <html data-theme="light">.
  Pair with html[data-theme="light"] and html[data-theme="dark"] var blocks.
  Example: <button class="theme-toggle" data-theme-toggle>◐ Theme</button>
-->
<style>
  .theme-toggle {
    background: none;
    border: 1px solid var(--border-bright);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>

<button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">◐ Theme</button>

<script>
(function () {
  const root = document.documentElement;
  const saved = localStorage.getItem('theme');
  if (saved) {
    root.setAttribute('data-theme', saved);
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    root.setAttribute('data-theme', 'dark');
  }
  document.querySelectorAll('[data-theme-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  });
})();
</script>
